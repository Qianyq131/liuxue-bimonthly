<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留学赛道双月报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #f5f0f8 0%, #e8dbf0 100%);
    min-height: 100vh;
    color: #2d1b3d;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    color: #4A1942;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }
  .header p {
    font-size: 14px;
    color: #7B3F8C;
    letter-spacing: 1px;
  }
  .period-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .period-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 32px;
    background: white;
    border-radius: 16px;
    text-decoration: none;
    color: #2d1b3d;
    box-shadow: 0 2px 12px rgba(74, 25, 66, 0.08);
    transition: all 0.2s ease;
    border: 1px solid rgba(123, 63, 140, 0.1);
  }
  .period-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(74, 25, 66, 0.15);
    border-color: #7B3F8C;
  }
  .period-btn .left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .period-btn .emoji {
    font-size: 28px;
  }
  .period-btn .info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .period-btn .title {
    font-size: 18px;
    font-weight: 600;
    color: #4A1942;
  }
  .period-btn .date {
    font-size: 12px;
    color: #999;
  }
  .period-btn .arrow {
    font-size: 20px;
    color: #B06DC0;
    font-weight: 300;
  }
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: #999;
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(74, 25, 66, 0.05);
  }
  .footer {
    margin-top: 48px;
    text-align: center;
    color: #B06DC0;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 留学赛道双月报</h1>
      <p>小红书商业化 · 每双月更新 · 数据观察 &amp; 投放洞察</p>
    </div>
    <div class="period-list">
            <a class="period-btn" href="https://qianyq131.github.io/liuxue-bimonthly/202605-06/" target="_blank">
        <div class="left">
          <div class="emoji">📊</div>
          <div class="info">
            <div class="title">2026 年 5-6 月双月报</div>
            <div class="date">更新于 2026-07-22</div>
          </div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>
    <div class="footer">数据来源：小红书商业数据平台 · 更新时间：2026-07-22 06:45</div>
  </div>
</body>
</html>
